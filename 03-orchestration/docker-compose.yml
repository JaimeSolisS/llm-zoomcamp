volumes:
    kestra_postgres_data:
        driver: local
    kestra_data:
        driver: local
    kestra_tmp:
        driver: local

services:
    kestra_postgres:
        image: postgres:18
        volumes:
            - kestra_postgres_data:/var/lib/postgresql
        environment:
            POSTGRES_DB: kestra
            POSTGRES_USER: kestra
            POSTGRES_PASSWORD: k3str4
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
            interval: 30s
            timeout: 10s
            retries: 10

    kestra:
        image: kestra/kestra:v1.3.21
        pull_policy: always
        user: "root"
        command: server standalone
        volumes:
            - kestra_data:/app/storage
            - /var/run/docker.sock:/var/run/docker.sock
            - /tmp/kestra-wd:/tmp/kestra-wd
        environment:
            KESTRA_CONFIGURATION: |
                datasources:
                  postgres:
                    url: jdbc:postgresql://kestra_postgres:5432/kestra
                    driverClassName: org.postgresql.Driver
                    username: kestra
                    password: k3str4
                kestra:
                  server:
                    basicAuth:
                      username: "admin@kestra.io"
                      password: Admin1234!
                  repository:
                    type: postgres
                  storage:
                    type: local
                    local:
                      basePath: "/app/storage"
                  queue:
                    type: postgres
                  tasks:
                    tmpDir:
                      path: /tmp/kestra-wd/tmp
                  url: http://localhost:8080/
                  ai:
                    type: gemini
                    gemini:
                      model-name: gemini-2.5-flash
                      api-key: ${GEMINI_API_KEY}
        ports:
            - "8080:8080"
            - "8081:8081"
        healthcheck:
            test: ["CMD-SHELL", "curl -s http://localhost:8080/api/v1/ping | grep -q 'OK' || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 10
            start_period: 60s
        depends_on:
            kestra_postgres:
                condition: service_started

    kestra_init:
        image: curlimages/curl:latest
        environment:
            GEMINI_API_KEY: ${GEMINI_API_KEY}
            TAVILY_API_KEY: ${TAVILY_API_KEY}
            OPENAI_API_KEY: ${OPENAI_API_KEY}
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                curl -s -X PUT -u 'admin@kestra.io:Admin1234!' \
                  http://kestra:8080/api/v1/namespaces/zoomcamp/kv/GEMINI_API_KEY \
                  -H 'Content-Type: application/json' \
                  -d "\"$${GEMINI_API_KEY}\""
                curl -s -X PUT -u 'admin@kestra.io:Admin1234!' \
                  http://kestra:8080/api/v1/namespaces/zoomcamp/kv/TAVILY_API_KEY \
                  -H 'Content-Type: application/json' \
                  -d "\"$${TAVILY_API_KEY}\""
                curl -s -X PUT -u 'admin@kestra.io:Admin1234!' \
                  http://kestra:8080/api/v1/namespaces/zoomcamp/kv/OPENAI_API_KEY \
                  -H 'Content-Type: application/json' \
                  -d "\"$${OPENAI_API_KEY}\""
        depends_on:
            kestra:
                condition: service_healthy
